<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/layout}">
<head lang="ko">
    <meta charset="UTF-8">
    <title>공지사항</title>

    <style>
        body{ background:#f5f7fb; }

        .notice-wrap{ max-width:1200px; margin:60px auto; }

        .notice-header{
            display:flex; justify-content:space-between;
            align-items:center; margin-bottom:30px;
        }

        .notice-title h2{
            font-size:34px; font-weight:800; margin:0; color:#222;
        }

        .notice-title p{
            margin-top:8px; color:#777; font-size:15px;
        }

        .notice-card{
            background:#fff; border-radius:18px; overflow:hidden;
            box-shadow:0 10px 30px rgba(0,0,0,.08);
        }

        .notice-table thead{ background:#f8f9fa; }

        .notice-table th{
            padding:18px; text-align:center; border:none;
            font-size:15px; color:#555; font-weight:700;
        }

        .notice-table td{
            padding:18px; text-align:center; vertical-align:middle;
        }

        .notice-table tbody tr{ transition:.2s; }
        .notice-table tbody tr:hover{ background:#f8fbff; }

        .notice-link{
            text-decoration:none; color:#222; font-weight:600;
        }
        .notice-link:hover{ color:#0d6efd; }

        .notice-title-cell{ text-align:left!important; }
        .notice-date{ color:#777; font-size:14px; }

        .btn-write{
            border-radius:30px; padding:10px 24px; font-weight:600;
        }

        .pagination{ margin:35px 0; }
        .page-link{ border-radius:8px!important; margin:0 3px; }
    </style>
</head>

<body>
<div layout:fragment="content">

    <!-- 알림 -->
    <div th:if="${success}" class="alert alert-info alert-dismissible fade show" role="alert">
        <span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="container notice-wrap">

        <!-- Header -->
        <div class="notice-header">
            <div class="notice-title">
                <h2>📢 공지사항</h2>
                <p>BookStore의 새로운 소식과 이벤트를 확인하세요.</p>
            </div>

            <a th:href="@{/board/write}" class="btn btn-primary btn-write">
                + 글쓰기
            </a>
        </div>

        <!-- Table -->
        <div class="notice-card">
            <table class="table notice-table">
                <thead>
                <tr>
                    <th width="8%">번호</th>
                    <th width="54%">제목</th>
                    <th width="12%">작성자</th>
                    <th width="16%">작성일</th>
                    <th width="10%">조회수</th>
                </tr>
                </thead>

                <tbody>
                <tr th:each="dto, i : ${list}">
                    <td th:text="${paging.listtotal - ((paging.current-1)*paging.onepagelist) - i.index}"></td>

                    <td class="notice-title-cell">
                        <a class="notice-link"
                           th:href="@{/board/detail(id=${dto.id})}"
                           th:text="${dto.btitle}">
                        </a>
                    </td>

                    <td th:text="${dto.appUserId}"></td>
                    <td class="notice-date" th:text="${dto.createdAt}"></td>
                    <td th:text="${dto.bhit}"></td>
                </tr>

                <tr th:if="${#lists.isEmpty(list)}">
                    <td colspan="5" class="py-5 text-secondary">
                        등록된 공지사항이 없습니다.
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <!-- Pagination -->
        <nav>
            <ul class="pagination justify-content-center">

                <!-- 이전 -->
                <li class="page-item" th:if="${paging.start > 1}">
                    <a class="page-link"
                       th:href="@{/board/list(pageNo=${paging.start - 1})}">
                        이전
                    </a>
                </li>

                <!-- 페이지 번호 -->
                <li class="page-item"
                    th:each="pageNum : ${#numbers.sequence(paging.start, paging.end)}"
                    th:classappend="${pageNum == paging.current} ? 'active'">
                    <a class="page-link"
                       th:text="${pageNum}"
                       th:href="@{/board/list(pageNo=${pageNum})}">
                    </a>
                </li>

                <!-- 다음 -->
                <li class="page-item" th:if="${paging.end < paging.pagetotal}">
                    <a class="page-link"
                       th:href="@{/board/list(pageNo=${paging.end + 1})}">
                        다음
                    </a>
                </li>

            </ul>
        </nav>

    </div>
</div>
</body>
</html>
