<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
     xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head lang="ko">
<meta charset="UTF-8">
<title>Insert title here</title>
<!-- Latest compiled and minified CSS -->
<link
   href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
   rel="stylesheet"> 
<!-- Latest compiled JavaScript -->
<script
   src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<link  rel="stylesheet"  th:href="@{/css/mycss.css}" />
<link  rel="stylesheet"  th:href="@{/css/summernote-lite.min.css}" />

  <style>
        *{ margin:0; padding:0; box-sizing:border-box; }
        body{ background:#f5f6f8; font-family:'Noto Sans KR',sans-serif; }

        .header{ position:sticky; top:0; z-index:1000; background:#fff;
                 border-bottom:1px solid #e9ecef; box-shadow:0 4px 18px rgba(0,0,0,.05); }

        .header-inner{ max-width:1280px; margin:auto; height:80px;
                       display:flex; align-items:center; justify-content:space-between;
                       gap:30px; padding:0 24px; }

        .logo{ font-size:30px; font-weight:800; color:#2563eb; text-decoration:none; letter-spacing:-1px; }
        .logo:hover{ color:#1d4ed8; }

        .search-box{ flex:1; max-width:600px; }
        .search-form{ position:relative; }
        .search-form input{ width:100%; height:50px; border:2px solid #2563eb;
                            border-radius:40px; padding:0 60px 0 22px; font-size:15px; background:#fff; }
        .search-form input:focus{ outline:none; box-shadow:0 0 0 5px rgba(37,99,235,.15); }

        .search-btn{ position:absolute; right:6px; top:6px; width:38px; height:38px;
                     border:none; border-radius:50%; background:#2563eb; color:#fff; font-size:17px; }

        .nav-menu{ display:flex; align-items:center; gap:22px; }
        .nav-menu>a{ color:#444; text-decoration:none; font-weight:600; position:relative; }
        .nav-menu>a:hover{ color:#2563eb; }
        .nav-menu>a::after{ content:''; position:absolute; left:0; bottom:-5px; width:0; height:2px;
                            background:#2563eb; transition:.25s; }
        .nav-menu>a:hover::after{ width:100%; }

        .user-name{ color:#2563eb !important; font-weight:700 !important; }

        @media(max-width:900px){
            .header-inner{ height:auto; flex-wrap:wrap; padding:18px; }
            .logo{ width:100%; text-align:center; }
            .search-box{ width:100%; order:2; max-width:100%; }
            .nav-menu{ width:100%; justify-content:center; flex-wrap:wrap; gap:16px; order:3; }
        }
        
        	    .footer {
	        margin-top: 80px;
	        background: #212529;
	        color: #adb5bd;
	    }
	
	    .footer-bottom {
	        border-top: 1px solid rgba(255,255,255,.1);
	        padding: 18px 0;
	        text-align: center;
	        font-size: .9rem;
	        color: #868e96;
	    }
	
	    .footer-bottom strong {
	        color: #ffffff;
	    }
    </style>
</head>
<body>
   <!-- header.html --> 
   <th:block th:replace="fragments/header  ::  header" />
   <!-- content.html -->
   <div class="container   my-3"> 
      <th:block   layout:fragment="content"  />
   </div>
   <!-- footer.html --> 
   <th:block th:replace="fragments/footer  ::  footer" />
</body>
</html>
