<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head lang="ko">
    <title>BookStore</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <style>
        *{ margin:0; padding:0; box-sizing:border-box; }
        body{ background:#f5f6f8; font-family:'Noto Sans KR',sans-serif; }

        .header{ position:sticky; top:0; z-index:1000; background:#fff;
                 border-bottom:1px solid #e9ecef; box-shadow:0 4px 18px rgba(0,0,0,.05); }

        .header-inner{ max-width:1280px; margin:auto; height:80px;
                       display:flex; align-items:center; justify-content:space-between;
                       gap:30px; padding:0 24px; }

        .logo{ font-size:30px; font-weight:800; color:#2563eb; text-decoration:none; letter-spacing:-1px; }
        .logo:hover{ color:#1d4ed8; }

        /* 검색창 */
        .search-box{ flex:1; max-width:600px; position:relative; }
        .search-input{ width:100%; height:50px; border:2px solid #2563eb;
                       border-radius:40px; padding:0 60px 0 22px; font-size:15px; background:#fff; }
        .search-input:focus{ outline:none; box-shadow:0 0 0 5px rgba(37,99,235,.15); }

        .search-btn{ position:absolute; right:6px; top:6px; width:38px; height:38px;
                     border:none; border-radius:50%; background:#2563eb; color:#fff; font-size:17px; }

        /* 자동검색 결과 */
        .search-result{
            position:absolute;
            top:60px;
            width:100%;
            background:#fff;
            border-radius:12px;
            box-shadow:0 6px 20px rgba(0,0,0,.12);
            padding:12px;
            display:none;
            max-height:300px;
            overflow-y:auto;
        }
        .search-item{ padding:10px; cursor:pointer; border-bottom:1px solid #eee; }
        .search-item:hover{ background:#f1f5ff; color:#2563eb; }

        .nav-menu{ display:flex; align-items:center; gap:22px; }
        .nav-menu>a{ color:#444; text-decoration:none; font-weight:600; position:relative; }
        .nav-menu>a:hover{ color:#2563eb; }
        .nav-menu>a::after{ content:''; position:absolute; left:0; bottom:-5px; width:0; height:2px;
                            background:#2563eb; transition:.25s; }
        .nav-menu>a:hover::after{ width:100%; }

        .user-name{ color:#2563eb !important; font-weight:700 !important; }

        @media(max-width:900px){
            .header-inner{ height:auto; flex-wrap:wrap; padding:18px; }
            .logo{ width:100%; text-align:center; }
            .search-box{ width:100%; order:2; max-width:100%; }
            .nav-menu{ width:100%; justify-content:center; flex-wrap:wrap; gap:16px; order:3; }
        }
    </style>
</head>

<body>
<th:block th:fragment="header">

<header class="header">

    <div class="header-inner">

        <!-- Logo -->
        <a class="logo" th:href="@{/book/list}">
            📚 BookStore
        </a>

        <!-- AJAX Search -->
        <div class="search-box">

            <input type="text" id="searchInput" class="search-input"
                   placeholder="도서명 · 작가 · 출판사 검색">

            <button class="search-btn" type="button">🔍</button>

            <!-- 자동검색 결과 -->
            <div id="searchResult" class="search-result"></div>

        </div>

        <!-- Navigation -->
        <nav class="nav-menu">

            <a th:href="@{/book/list}">📖 도서</a>
            <a th:href="@{/board/list}">📢 공지사항</a>

            <!-- 비로그인 -->
            <sec:authorize access="isAnonymous()">
                <a th:href="@{/users/login}">로그인</a>
                <a th:href="@{/users/join}">회원가입</a>
            </sec:authorize>

            <!-- 로그인 -->
            <sec:authorize access="isAuthenticated()">

                <a class="user-name" th:href="@{/users/mypage}">
                    👤 <sec:authentication property="principal.dto.email"/>
                </a>

                <form class="logout-form" th:action="@{/users/logout}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button class="btn btn-outline-danger btn-sm">로그아웃</button>
                </form>

            </sec:authorize>

        </nav>

    </div>

</header>

</th:block>

<!-- AJAX SCRIPT -->
<script>
    const input = document.getElementById("searchInput");
    const resultBox = document.getElementById("searchResult");

    input.addEventListener("keyup", function() {
        const keyword = this.value.trim();

        if (keyword.length < 1) {
            resultBox.style.display = "none";
            resultBox.innerHTML = "";
            return;
        }

        fetch(`/book/search?keyword=` + keyword)
            .then(res => res.json())
            .then(list => {

                if (list.length === 0) {
                    resultBox.innerHTML = "<div class='search-item'>검색 결과 없음</div>";
                    resultBox.style.display = "block";
                    return;
                }

                let html = "";
                list.forEach(book => {
                    html += `
                        <div class="search-item"
                             onclick="location.href='/book/detail?bookId=${book.bookId}'">
                            ${book.title} - ${book.author}
                        </div>
                    `;
                });

                resultBox.innerHTML = html;
                resultBox.style.display = "block";
            });
    });
</script>

</body>
</html>
