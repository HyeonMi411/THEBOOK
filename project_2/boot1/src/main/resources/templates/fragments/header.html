<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
    xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
   xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head lang="ko">
<title>BookStore</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link
   href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
   rel="stylesheet">
<script
   src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
   <th:block th:fragment="header">



		
		    <div class="header-inner">
		
		        <!-- Logo -->
		        <a class="logo" th:href="@{/book/list}">
		            📚 BookStore
		        </a>
		
		        <!-- Search -->
		        <div class="search-box">
		
		            <input id="searchInput"
		                   type="text"
		                   class="form-control"
		                   placeholder="도서명 · 작가 · 출판사 검색">
		
		            <!-- <button class="search-btn" onclick="goSearch()">🔍</button> -->
		
		            <!-- AJAX 검색 결과 -->
		            <div id="searchResult" class="search-result-box"></div>		            
		            <div class="searchResult"></div>
		
		        </div>
		
		        <!-- Navigation -->
		        <nav class="nav-menu">
		
		            <a th:href="@{/book/list}">📖 도서</a>		            
					<a th:href="@{/book/search/nl}"> 📚 국립중앙도서관 </a>
		            <a th:href="@{/board/list.do}">📢 공지사항</a>
		
		            <!-- 비로그인 -->
				    <sec:authorize access="isAnonymous()">
				        <a th:href="@{/users/login}">🔑 로그인</a>
				        <a th:href="@{/users/join}">📝 회원가입</a>
				    </sec:authorize>
		
		            <!-- 로그인 -->
		            <sec:authorize access="isAuthenticated()">
		
		                <a class="user-name" th:href="@{/users/mypage}">
		                    <!-- 👤 <span sec:authentication="principal.dto.email"></span> -->
		                </a>
		
		                <form class="logout-form" th:action="@{/users/logout}" method="post">
		                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
		                    <button class="btn btn-outline-danger btn-sm">로그아웃</button>
		                </form>
		
		            </sec:authorize>
		
		        </nav>
		
		    </div>
		
		

 		<script>
		/* ===========================
		   🔍 AJAX 실시간 검색
		=========================== */		
		window.addEventListener("load", function(){

		    const input  = document.getElementById("searchInput");
		    const result = document.getElementById("searchResult");

		    input.addEventListener("keyup", function(e){

		        let keyword = e.target.value.trim();

		        if(keyword === ""){
		            result.style.display = "none";
		            result.innerHTML = "";
		            return;
		        }

		        fetch(`/book/search?keyword=${encodeURIComponent(keyword)}`)
		            .then(response => response.json())
		            .then(data => {

		                result.innerHTML = "";
		                result.style.display = "block";

		                if(data.length === 0){
		                    result.innerHTML = `
		                        <div class="search-item">검색 결과 없음</div>
		                    `;
		                    return;
		                }

		                data.forEach(book => {
		                    result.innerHTML += `
		                        <div class="search-item"
		                             onclick="location.href='/book/detail?bookId=${book.bookId}'">
		                            <strong>${book.title}</strong><br>
		                            <small>${book.author} · ${book.publisher}</small>
		                        </div>
		                    `;
		                });

		            })
		            .catch(err => {
		                result.innerHTML = `
		                    <div class="search-item">서버 오류가 발생했습니다.</div>
		                `;
		                result.style.display = "block";
		            });

		    });

		});

		/* 검색 버튼 클릭 */
/* 		function goSearch(){
		    let keyword = document.getElementById("searchInput").value.trim();
		    if(keyword !== ""){
		        location.href = `/book/search?keyword=${encodeURIComponent(keyword)}`;
		    }
		} */
		</script>




   </th:block>
</body>
</html>
