<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head lang="ko">
<title>BookStore</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<style>
    .header-inner {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 15px 20px;
        background: #f8f9fa;
        border-bottom: 1px solid #ddd;
    }

    .logo {
        font-size: 24px;
        font-weight: bold;
        text-decoration: none;
        color: #333;
    }

    .search-box {
        position: relative;
        width: 350px;
    }

    .search-result-box {
        position: absolute;
        background: white;
        width: 100%;
        border: 1px solid #ddd;
        border-radius: 4px;
        max-height: 300px;
        overflow-y: auto;
        display: none;
        z-index: 9999;
    }

    .search-item {
        padding: 10px;
        cursor: pointer;
        border-bottom: 1px solid #eee;
    }

    .search-item:hover {
        background: #f5f5f5;
    }

    .nav-menu a {
        margin-left: 15px;
        text-decoration: none;
        color: #333;
        font-weight: 500;
    }
</style>
</head>

<body>
<th:block th:fragment="header">

    <div class="header-inner">

        <!-- Logo -->
        <a class="logo" th:href="@{/book/list}">
            📚 BookStore
        </a>

        <!-- Search -->
        <div class="search-box">
            <input id="searchInput"
                   type="text"
                   class="form-control"
                   placeholder="도서명 · 작가 · 출판사 검색">

            <div id="searchResult" class="search-result-box"></div>
        </div>

        <!-- Navigation + 로그인 UI (두 번째 방식으로 변경) -->
        <nav class="nav-menu d-flex align-items-center">

            <a th:href="@{/book/list}">📖 도서</a>
            <a th:href="@{/book/search/nl}">📚 국립중앙도서관</a>
            <a th:href="@{/board/list.do}">📢 공지사항</a>

            <!-- 오른쪽 로그인/로그아웃 영역 -->
            <ul class="navbar-nav d-flex flex-row ms-3">

                <!-- 비로그인 -->
                <li class="nav-item" sec:authorize="isAnonymous()">
                    <a class="nav-link px-2" th:href="@{/users/login}">🔑 LOGIN</a>
                </li>

                <li class="nav-item" sec:authorize="isAnonymous()">
                    <a class="nav-link px-2" th:href="@{/users/join}">📝 JOIN</a>
                </li>

                <!-- 로그인 -->
                <li class="nav-item" sec:authorize="isAuthenticated()">
                    <a class="nav-link px-2" th:href="@{/users/mypage}">
                        👤 <span sec:authentication="principal.username"></span>
                    </a>
                </li>

                <li class="nav-item" sec:authorize="isAuthenticated()">
                    <form th:action="@{/users/logout}" method="post" class="d-inline">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <button type="submit" class="nav-link btn btn-link px-2 text-danger">
                            LOGOUT
                        </button>
                    </form>
                </li>

            </ul>

        </nav>

    </div>

    <!-- AJAX 검색 기능 -->
    <script>
        window.addEventListener("load", function () {

            const input = document.getElementById("searchInput");
            const result = document.getElementById("searchResult");

            input.addEventListener("keyup", function (e) {

                let keyword = e.target.value.trim();

                if (keyword === "") {
                    result.style.display = "none";
                    result.innerHTML = "";
                    return;
                }

                fetch(`/book/search?keyword=${encodeURIComponent(keyword)}`)
                    .then(response => response.json())
                    .then(data => {

                        result.innerHTML = "";
                        result.style.display = "block";

                        if (data.length === 0) {
                            result.innerHTML = `<div class="search-item">검색 결과 없음</div>`;
                            return;
                        }

                        data.forEach(book => {
                            result.innerHTML += `
                                <div class="search-item"
                                     onclick="location.href='/book/detail?bookId=${book.bookId}'">
                                    <strong>${book.title}</strong><br>
                                    <small>${book.author} · ${book.publisher}</small>
                                </div>
                            `;
                        });

                    })
                    .catch(err => {
                        result.innerHTML = `<div class="search-item">서버 오류가 발생했습니다.</div>`;
                        result.style.display = "block";
                    });

            });

        });
    </script>

</th:block>
</body>
</html>
