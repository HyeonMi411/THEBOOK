<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
   xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
   layout:decorate="~{fragments/layout}">

<head lang="ko">
<meta charset="UTF-8">
<title>BookStore</title>
</head>

<body>
<div layout:fragment="content">

    <div class="book-wrap">

        <!-- Header -->
        <div class="page-header">
            <div class="page-title">
                📚 <span>BookStore</span>
            </div>

            <a th:href="@{/book/write}" class="btn btn-primary btn-write">
                + 도서 등록
            </a>
        </div>

        <!-- ⭐ 선택한 분류명 표시 (국립중앙도서관 API에서 넘어온 category) -->
        <div th:if="${selectedCategory != null}" class="mb-3">
            <strong>선택한 분류명:</strong>
            <span th:text="${selectedCategory}"></span>
        </div>

        <!-- Book Grid -->
        <div class="book-grid">

            <div class="book-card"
                 th:each="book : ${list}"
                 th:onclick="|location.href='/book/detail?bookId=${book.bookId}'|">

				<div class="book-cover">
				    <!-- bookCover가 http로 시작하면 그대로, 아니면 /upload/ 붙여서 출력 -->
				    <img th:src="${book.bookCover != null && book.bookCover.startsWith('http')} 
				                 ? ${book.bookCover} 
				                 : '/upload/' + ${book.bookCover}"
				         th:alt="${book.title}">
				</div>
				                
				<div class="book-body">

                    <div class="book-title" th:text="${book.title}"></div>

                    <div class="book-author"
                         th:text="${book.author} + ' · ' + ${book.publisher}">
                    </div>

                    <div class="book-category" th:text="${book.category}"></div>

                    <div class="book-rating" th:if="${book.rating != null}">
                        <div class="star">⭐ <span th:text="${book.rating}"></span></div>
                        <div class="review">리뷰 <span th:text="${book.reviewCount}"></span></div>
                    </div>

                </div>

            </div>

        </div>

        <!-- Pagination -->
        <div class="pagination-area">
            <ul class="pagination justify-content-center">

                <li class="page-item" th:if="${paging.start > paging.bottomlist}">
                    <a class="page-link" th:href="@{|/book/list?pstartno=${paging.start-1}|}">
                        이전
                    </a>
                </li>

                <li th:each="i : ${#numbers.sequence(paging.start, paging.end)}"
                    th:class="'page-item ' + (${i} == ${paging.current} ? 'active' : '')">

                    <a class="page-link"
                       th:href="@{|/book/list?pstartno=${i}|}"
                       th:text="${i}">
                    </a>

                </li>

                <li class="page-item" th:if="${paging.pagetotal > paging.end}">
                    <a class="page-link" th:href="@{|/book/list?pstartno=${paging.end+1}|}">
                        다음
                    </a>
                </li>

            </ul>
        </div>

    </div>

</div>
</body>
</html>
