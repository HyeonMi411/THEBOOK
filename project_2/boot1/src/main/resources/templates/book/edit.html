<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
   xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
   layout:decorate="~{fragments/layout}">
<!--    #1. layout 렌더링    -->
<head lang="ko">
<meta charset="UTF-8">
<title>Insert title here</title>
</head>
<body>
    <div  layout:fragment="content">
    
    <div class="write-wrap">

        <div class="card write-card">

            <div class="write-header">
                <h2>✏️ 도서 정보 수정</h2>
                <p>등록된 도서 정보를 수정합니다.</p>
            </div>

            <div class="write-body">

                <form th:action="@{|/book/edit?bookId=${book.bookId}|}"
                      method="post"
                      enctype="multipart/form-data">

                    <!-- CSRF -->
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                    <!-- 기존 이미지명 저장 -->
                    <input type="hidden" id="originalImg" th:value="${book.bookCover}"/>

                    <div class="row g-4">

                        <!-- 입력 영역 -->
                        <div class="col-lg-8">

                            <div class="row g-3">

                                <div class="col-md-8">
                                    <label class="form-label">도서 제목</label>
                                    <input type="text" name="title" class="form-control"
                                           th:value="${book.title}" required>
                                </div>

                                <div class="col-md-4">
                                    <label class="form-label">저자</label>
                                    <input type="text" name="author" class="form-control"
                                           th:value="${book.author}" required>
                                </div>

                                <div class="col-md-4">
                                    <label class="form-label">출판사</label>
                                    <input type="text" name="publisher" class="form-control"
                                           th:value="${book.publisher}">
                                </div>

                                <div class="col-md-4">
                                    <label class="form-label">출판일</label>
                                    <input type="date" name="publishDate" class="form-control"
                                           th:value="${book.publishDate}">
                                </div>

                                <div class="col-md-4">
                                    <label class="form-label">카테고리</label>
                                    <input type="text" name="category" class="form-control"
                                           th:value="${book.category}">
                                </div>

                                <div class="col-md-4">
                                    <label class="form-label">판매 가격</label>
                                    <input type="number" name="price" class="form-control"
                                           th:value="${book.price}">
                                </div>

                                <div class="col-md-4">
                                    <label class="form-label">페이지 수</label>
                                    <input type="number" name="pages" class="form-control"
                                           th:value="${book.pages}">
                                </div>

                                <div class="col-md-4">
                                    <label class="form-label">랭킹</label>
                                    <input type="text" name="ranking" class="form-control"
                                           th:value="${book.ranking}">
                                </div>

                                <div class="col-md-6">
                                    <label class="form-label">평점</label>
                                    <input type="text" name="rating" class="form-control"
                                           th:value="${book.rating}">
                                </div>

                                <div class="col-md-6">
                                    <label class="form-label">리뷰 수</label>
                                    <input type="number" name="reviewCount" class="form-control"
                                           th:value="${book.reviewCount}">
                                </div>

                            </div>

                        </div>

                        <!-- 이미지 영역 -->
                        <div class="col-lg-4">

                            <div class="preview-box">

                                <img id="previewImg"
                                     th:if="${book.bookCover != null}"
                                     th:src="@{'/upload/' + ${book.bookCover}}">

                                <img id="previewImg"
                                     th:if="${book.bookCover == null}"
                                     src="https://via.placeholder.com/180x240?text=Book">

                            </div>

                            <div class="upload-box">

                                <label class="form-label">표지 이미지 변경</label>

                                <input type="file"
                                       id="file"
                                       name="file"
                                       class="form-control"
                                       onchange="readURL(this);">

                                <div class="form-text mt-2">
                                    JPG, PNG 파일 업로드
                                </div>

                            </div>

                        </div>

                    </div>

                    <div class="mt-4">
                        <label class="form-label">도서 소개</label>
                        <textarea name="description" class="form-control"
                                  th:text="${book.description}"></textarea>
                    </div>

                    <div class="button-area">

                        <div class="d-flex justify-content-end gap-2">

                            <a href="javascript:history.back();" class="btn btn-outline-secondary">
                                취소
                            </a>

                            <button type="submit" class="btn btn-primary">
                                ✏️ 수정 완료
                            </button>

                        </div>

                    </div>

                </form>

            </div>

        </div>

    </div>
        
    </div>
</body>
</html>
